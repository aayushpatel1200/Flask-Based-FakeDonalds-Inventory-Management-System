<!DOCTYPE html>
<html>
<head>
  <title>Daily Entry</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <h2>Daily Inventory Entry</h2>
  <form method="POST">
    {% for name, item in inventory.items() %}
      <label>{{ name.title() }} (Boxes):</label>
      <input type="number" name="{{ name }}" value="{{ item.quantity }}"><br><br>
    {% endfor %}
    <input type="submit" value="Update">
  </form>
  <br><a href="/">Back to Home</a>
</body>
</html>
